name: design_builder
description: A build tool that generates Flutter ThemeExtension code from W3C Design Tokens with light/dark mode support and runtime overrides
version: 1.0.1
homepage: https://github.com/khode-io/design-builder
repository: https://github.com/khode-io/design-builder
issue_tracker: https://github.com/khode-io/design-builder/issues

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  build: ^4.0.6
  glob: ^2.1.3
  logging: ^1.3.0
  path: ^1.9.1
  yaml: ^3.1.3

dev_dependencies:
  build_runner: ^2.4.13
  build_test: ^3.5.15
  lints: ^6.0.0
  test: ^1.26.3
