name: design_builder
description: Build runner for generating Flutter ThemeExtension from W3C Design Tokens
version: 1.0.0
homepage: https://github.com/yourusername/design_builder
repository: https://github.com/yourusername/design_builder
issue_tracker: https://github.com/yourusername/design_builder/issues
publish_to: none

# Note: Not using workspace resolution due to build_runner dependency conflicts
environment:
  sdk: ">=3.11.0 <4.0.0"

dependencies:
  build: ">=2.4.0 <4.0.0"
  glob: ^2.1.2
  logging: ^1.2.0
  path: ^1.9.0
  yaml: ^3.1.2

dev_dependencies:
  build_runner: ^2.4.13
  build_test: ^2.2.2
  lints: ^6.0.0
  test: ^1.26.3
